services:
  app:
    # Prebuilt multi-arch image from Docker Hub. Pin the version in .env
    # (RCONFIG_VERSION); it falls back to the latest stable release.
    # GHCR mirror: ghcr.io/rconfig/rconfig:${RCONFIG_VERSION:-latest}
    image: rconfig/rconfig:${RCONFIG_VERSION:-latest}
    container_name: rconfig_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rconfig}
      - DB_USERNAME=${DB_USERNAME:-rconfig_user}
      - DB_PASSWORD=${DB_PASSWORD:-rconfig_pass}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      # Persistent application storage (device config backups, logs, keys).
      # Default: a Docker-managed named volume, seeded automatically on first run.
      - storage_data:/var/www/html/rconfig/storage
      # Prefer storage on a visible host path instead? Comment the line above
      # and uncomment the bind mount below (the entrypoint seeds an empty dir):
      # - ./storage:/var/www/html/rconfig/storage
      # The .env file is bind mounted so key:generate and v8core:install can
      # write APP_KEY back to your host copy.
      - ./.env:/var/www/html/rconfig/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - rconfig_network

  db:
    image: mariadb:10.11
    container_name: rconfig_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-rconfig}
      MYSQL_USER: ${DB_USERNAME:-rconfig_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rconfig_pass}
    ports:
      - "${DB_PORT_HOST:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - rconfig_network

  redis:
    image: redis:7-alpine
    container_name: rconfig_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - rconfig_network

volumes:
  db_data:
  redis_data:
  storage_data:

networks:
  rconfig_network:
    driver: bridge
